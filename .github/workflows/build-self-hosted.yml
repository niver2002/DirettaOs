name: Build appliance image on self-hosted runner

on:
  workflow_dispatch:
    inputs:
      board_pack:
        description: Board pack to build
        required: false
        default: raspberry-pi-5
      payload_mode:
        description: Payload mode
        required: false
        default: diretta-personal-use
      base_image_path:
        description: Absolute path to base image on the runner (optional)
        required: false
        default: ''
      boot_firmware_dir:
        description: Absolute path to boot firmware directory on the runner (optional)
        required: false
        default: ''
      prebuilt_image_zip:
        description: Absolute path to official Pi prebuilt image zip on the runner (optional)
        required: false
        default: ''
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: [self-hosted, linux, x64, diretta-builder]
    env:
      DIRETTA_SDK_PATH: ${{ vars.DIRETTA_SDK_PATH }}
      BASE_IMAGE_PATH: ${{ github.event.inputs.base_image_path || vars.BASE_IMAGE_PATH }}
      BOOT_FIRMWARE_DIR: ${{ github.event.inputs.boot_firmware_dir || vars.BOOT_FIRMWARE_DIR }}
      PREBUILT_IMAGE_ZIP: ${{ github.event.inputs.prebuilt_image_zip || vars.PREBUILT_IMAGE_ZIP }}
      BOARD_PACK: ${{ github.event.inputs.board_pack || 'raspberry-pi-5' }}
      PAYLOAD_MODE: ${{ github.event.inputs.payload_mode || 'diretta-personal-use' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify SDK
        run: |
          export DIRETTA_SDK_PATH="${DIRETTA_SDK_PATH:-$HOME/audio/DirettaHostSDK_149}"
          export PREBUILT_IMAGE_ZIP="${PREBUILT_IMAGE_ZIP:-$HOME/Downloads/diretta_RaspberryPi5_149_16_includeRoonBridge.zip}"
          echo "DIRETTA_SDK_PATH=${DIRETTA_SDK_PATH}"
          echo "PREBUILT_IMAGE_ZIP=${PREBUILT_IMAGE_ZIP}"
          test -d "${DIRETTA_SDK_PATH}/Host"
          test -d "${DIRETTA_SDK_PATH}/lib"

      - name: Install image build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools e2fsprogs mount parted rsync util-linux

      - name: Build final OS image
        run: |
          export DIRETTA_SDK_PATH="${DIRETTA_SDK_PATH:-$HOME/audio/DirettaHostSDK_149}"
          export PREBUILT_IMAGE_ZIP="${PREBUILT_IMAGE_ZIP:-$HOME/Downloads/diretta_RaspberryPi5_149_16_includeRoonBridge.zip}"
          chmod +x scripts/build-final-os-image.sh
          DIRETTA_SDK_PATH="${DIRETTA_SDK_PATH}" \
          BASE_IMAGE_PATH="${BASE_IMAGE_PATH}" \
          BOOT_FIRMWARE_DIR="${BOOT_FIRMWARE_DIR}" \
          PREBUILT_IMAGE_ZIP="${PREBUILT_IMAGE_ZIP}" \
          BOARD_PACK="${BOARD_PACK}" \
          PAYLOAD_MODE="${PAYLOAD_MODE}" \
          ./scripts/build-final-os-image.sh

      - name: Upload appliance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appliance-image-artifacts
          path: out/artifacts/*
