# Diretta UPnP Renderer Configuration
# 
# This file is sourced by the systemd service unit.
# Modify these values to change renderer behavior.
#
# After changing values, reload:
#   sudo systemctl daemon-reload
#   sudo systemctl restart diretta-renderer

# ============================================================================
# BASIC SETTINGS
# ============================================================================

# Target Diretta device number (1 = first found)
TARGET=1

# UPnP port (default: 4005)
PORT=4005

# Renderer name (visible to UPnP control points, supports spaces)
# Example: NAME="Devialet Target"
# Leave empty for default: "Diretta Renderer"
NAME=""

# Gapless playback
# Add "--no-gapless" to disable, leave empty to enable
GAPLESS=""

# Log verbosity
# Options:
#   ""          - Normal output (INFO level, default)
#   "--verbose" - Debug logs (all messages)
#   "--quiet"   - Warnings and errors only
VERBOSE=""

# Minimal UPnP mode
# Set to "1" to disable position polling and event notifications.
# Reduces CPU overhead during playback for improved audio quality
# (less brilliance, more analog sound, lower noise floor).
#
# Recommended for:
#   - JPlay iOS (doesn't use position polling or events)
#   - LMS via slim2UPnP (eliminates position bar drift/advance)
#   - Roon (eliminates position bar drift, progression becomes approximate)
#   - Any setup where audio quality matters more than precise UI tracking
#
# Not recommended for:
#   - UAPP, mConnect, BubbleUPnP if you need accurate progress bar
#
# Leave empty for standard UPnP behavior (full compatibility).
#MINIMAL_UPNP=1

# ============================================================================
# NETWORK INTERFACE SETTINGS (for multi-homed systems)
# ============================================================================
# 
# For systems with multiple network interfaces (e.g., 3-tier architecture),
# specify which interface to use for UPnP discovery and SSDP broadcasts.
#
# This is essential for proper operation when you have:
#   - Multiple network cards (eth0, eth1, eno1, eno2, etc.)
#   - VPN connections
#   - Bridged networks
#   - Separate control and audio networks
#
# IMPORTANT: Choose the interface connected to your UPnP control points
#            (e.g., JPlay, Roon, BubbleUPnP), NOT the Diretta audio network!
#
# Examples:
#   INTERFACE="eth0"           # Use interface name (recommended)
#   INTERFACE="192.168.1.10"  # Use specific IP address
#   INTERFACE=""               # Auto-detect (default)
#
# Common scenarios:
#
#   Single network (default):
#     INTERFACE=""
#
#   3-tier architecture (recommended by dsnyder):
#     Control Points: 192.168.1.x on eth0
#     Host:          192.168.1.10 (eth0) + 192.168.2.10 (eth1)
#     Diretta DAC:   192.168.2.100 on eth1
#     
#     Use: INTERFACE="eth0"
#          TARGET should point to 192.168.2.100
#
#   VPN + Local network:
#     Local:  192.168.1.x on eth0
#     VPN:    10.0.0.x on tun0
#     
#     Use: INTERFACE="eth0" (for local control points)
#
# To list your network interfaces:
#   ip link show
#   ip addr show
#
INTERFACE=""

# ============================================================================
# ADVANCED NETWORK SETTINGS
# ============================================================================
# Force the speed/duplex of the NIC used to reach the Diretta target via
# ethtool (some users report perceived sound-quality differences when
# constraining the link). Requires the `ethtool` package to be installed;
# the launcher logs a warning and skips link tuning if it is missing.
#
# WARNING: 10/100 Mbps may underrun on hi-res or DSD streams. Indicative
# raw-audio bandwidth (not counting Diretta/Ethernet overhead):
#   PCM 44.1/16/2  ~1.4 Mbps
#   PCM 192/24/2   ~9.2 Mbps     → 100 Mbps comfortable
#   PCM 384/32/2   ~24.6 Mbps    → 100 Mbps still comfortable
#   DSD256         ~22.6 Mbps    → 100 Mbps comfortable
#   DSD512         ~45.2 Mbps    → 100 Mbps too tight, prefer 1000
#   DSD1024        ~90.4 Mbps    → 1000 Mbps required
# Leave TARGET_INTERFACE empty to disable. Change only via the web UI.
#
# Example values:
#   Interface name: eth0, enp1s0
#   Speed: 10, 100, 1000, 2500   (2500 only on 2.5 GbE NICs; ethtool rejects it otherwise and the launcher logs a warning)
#   Duplex: half, full
#
TARGET_INTERFACE=""
TARGET_SPEED=""
TARGET_DUPLEX=""

# ----------------------------------------------------------------------------
# IRQ affinity for the target NIC
# ----------------------------------------------------------------------------
# Pin the hardware interrupts of the network interface used to reach the
# Diretta target onto a specific set of CPUs, away from the audio worker
# core. Network IRQ activity colliding with the audio thread is a known
# source of jitter — especially on busy LANs.
#
# IRQ_INTERFACE: name of the NIC (e.g. "enp1s0"), or comma-separated list of
#                NIC names (e.g. "enp1s0,enp2s0") to cover setups with one
#                interface for the upstream source (LMS/Roon) and another for
#                the Diretta target. All IRQs whose line in /proc/interrupts
#                contains any of these strings are matched (including MSI-X
#                queues like "enp1s0-rx-0", "enp1s0-tx-0", etc.).
# IRQ_CPUS:      CPU list in /proc/irq/N/smp_affinity_list syntax.
#                Examples: "0-3", "0,2,4", "0-3,8-11"
#
# Recommended: pick CPUs *outside* whatever you set for --cpu-audio.
# E.g. with --cpu-audio 8 on a 5900X, IRQ_CPUS="0-5" pushes NIC interrupts
# to CCD 0 entirely, leaving CCD 1 quieter for the audio worker.
#
# Note: some MSI-X queues are managed by the kernel and read-only — those
# IRQs are reported as "skipped" in the launcher log. That is normal.
#
# Leave both empty to disable IRQ pinning.
#
IRQ_INTERFACE=""
IRQ_CPUS=""

# ============================================================================
# ADVANCED DIRETTA SDK SETTINGS
# ============================================================================
# Leave commented to use defaults. Uncomment and modify to override.

# Thread Mode (bitmask - add values together)
# Default: 1 (Critical only)
# 
# Available flags:
#   1     = Critical (REALTIME priority)
#   2     = NoShortSleep
#   4     = NoSleep4Core
#   8     = SocketNoBlock
#   16    = OccupiedCPU
#   32    = FEEDBACK (moving average)
#   64    = FEEDBACK (moving average)
#   128   = FEEDBACK (moving average)
#   256   = NOFASTFEEDBACK
#   512   = IDLEONE
#   1024  = IDLEALL
#   2048  = NOSLEEPFORCE
#   4096  = LIMITRESEND
#   8192  = NOJUMBOFRAME
#   16384 = NOFIREWALL
#   32768 = NORAWSOCKET
#
# Examples:
#   1     = Default (Critical only)
#   17    = Critical + OccupiedCPU (1+16)
#   33    = Critical + FEEDBACK32 (1+32)
#
#THREAD_MODE=1

# Transfer Packet Cycle Maximum Time (microseconds)
# Default: 10000 (10ms)
# Range: 333-10000
#CYCLE_TIME=10000

# Transfer Packet Cycle Minimum Time (microseconds)
# Only used in random mode
# Default: 333
#CYCLE_MIN_TIME=333

# Information Packet Cycle Time (microseconds)
# Default: 100000 (100ms)
#INFO_CYCLE=100000

# Transfer Mode
# Default: auto
# Options: auto, varmax, varauto, fixauto, random
#   auto    = Automatic (VarMax for PCM Hi-Res, VarAuto for DSD/low-bitrate)
#   varmax  = Flex cycle, maximum packet size
#   varauto = Flex cycle, auto-tuned
#   fixauto = Fixed cycle, auto-tuned
#   random  = Random cycle (uses CYCLE_MIN_TIME)
#TRANSFER_MODE=auto

# Target Profile Limit Time (microseconds)
# Default: 0
# 0 = SelfProfile (stable) - manage own profile
# >0 = TargetProfile (experimental) - auto-adapts to system load, falls back under high load
#TARGET_PROFILE_LIMIT=0

# MTU (bytes)
# Default: auto-detect
# Common values: 1500 (standard), 9000 (jumbo), 16128 (max jumbo)
#MTU=""

# ============================================================================
# CPU AFFINITY (Core Isolation)
# ============================================================================
# Pin audio threads to dedicated CPU cores for improved audio quality.
# Isolating the Diretta worker thread from other system activity reduces
# jitter and improves soundstage clarity, especially on multi-core systems.
#
# CPU_AUDIO: Core(s) for the Diretta SDK sending thread (critical hot path)
# CPU_DECODE: Core(s) for the renderer decode thread (decode, ffmpeg)
# CPU_OTHER: Core(s) for all other threads (UPnP, position)
#
# Each option accepts a single core or a comma-separated list:
#   CPU_AUDIO=3              # single core
#   CPU_AUDIO="3,4"          # multiple cores (kernel scheduler may move within set)
#
# Leave empty for no pinning (default behavior).
# Use different cores for best results (e.g., CPU_AUDIO=2 CPU_OTHER="3,4,5").
# Check available cores with: nproc  (or: lscpu)
#
# Example (isolate audio on core 2, decode on core 1, everything else on cores 3-5):
#CPU_AUDIO=2
#CPU_DECODE=1
#CPU_OTHER="3,4,5"

# ----------------------------------------------------------------------------
# SMT (Hyper-Threading) toggle
# ----------------------------------------------------------------------------
# Toggle Simultaneous Multi-Threading at service start via the kernel's
# /sys/devices/system/cpu/smt/control interface. Some audiophile users
# prefer SMT off for more deterministic per-core behaviour on a dedicated
# audio machine.
#
# Values:
#   ""           No change — leave the system as configured (default)
#   "on"         Enable SMT
#   "off"        Disable SMT (toggleable back to "on" later)
#   "forceoff"   Disable SMT and lock it off until the next reboot
#
# IMPORTANT — read before enabling:
# - This is a SYSTEM-WIDE setting. It affects every workload on the host,
#   not just DirettaRendererUPnP. On a dedicated audio machine that's
#   usually fine; on a multi-role machine, think twice.
# - Topology changes when SMT toggles. With SMT on a 12-core CPU exposes
#   24 logical CPUs (0-23); with SMT off, only 12 (0-11). If your CPU_AUDIO
#   or CPU_OTHER references logical CPUs that disappear under SMT off,
#   pinning will fail. Review those values whenever you change SMT.
# - The runtime toggle is NOT persistent across kernel reboots — the BIOS
#   default is restored at boot. The wrapper re-applies it at every service
#   start, which covers most cases. For boot-time persistence add `nosmt`
#   to the kernel cmdline (see docs/CONFIGURATION.md).
# - If your BIOS has SMT disabled (or locked off), this toggle has no
#   effect and the launcher logs a warning.
#
SMT=""

# ============================================================================
# BUFFER CONFIGURATION (Advanced)
# ============================================================================
# Tune buffer sizes and prefill thresholds for latency vs stability trade-off.
# Leave empty to use defaults (shown in parentheses).
#
# Larger buffers = more stability, less sensitive to network/CPU jitter
# Smaller buffers = lower latency, but more prone to underruns
#
# PCM:
#PCM_BUFFER_SECONDS=0.5          # Local PCM buffer (default 0.5)
#PCM_REMOTE_BUFFER_SECONDS=1.0   # Remote PCM buffer — Qobuz/Tidal (default 1.0)
#PCM_PREFILL_MS=80               # Local PCM prefill before starting (default 80)
#PCM_REMOTE_PREFILL_MS=150       # Remote PCM prefill (default 150)
#
# DSD:
#DSD_BUFFER_SECONDS=0.8          # DSD buffer (default 0.8)
#DSD_PREFILL_MS=200              # DSD prefill (default 200)

# ============================================================================
# PROCESS PRIORITY SETTINGS
# ============================================================================
# Control CPU and I/O scheduling priority for the renderer process.
# These replace the hardcoded systemd Nice= and IOSchedulingClass= directives,
# allowing adjustment via config file or web UI without editing the service.

# Nice level (-20 = highest priority, 19 = lowest)
# Default: -10 (high priority, suitable for audio)
# Recommended values:
#   -20  = Maximum priority (aggressive, may starve other processes)
#   -15  = Very high priority
#   -10  = High priority (default, good balance)
#    0   = Normal priority
NICE_LEVEL=-10

# I/O scheduling class
# Options: realtime, best-effort, idle
#   realtime    = Highest I/O priority (default, best for audio)
#   best-effort = Standard I/O priority
#   idle        = Only when no other I/O is pending
IO_SCHED_CLASS=realtime

# I/O scheduling priority (0-7, lower = higher priority)
# Only used with realtime and best-effort classes
# Default: 0 (highest within class)
IO_SCHED_PRIORITY=0

# SCHED_FIFO real-time priority for the audio worker thread (1-99)
# Higher = more priority. Only affects the internal audio streaming thread.
# Default: 50 (mid-range real-time)
# Recommended values:
#   50   = Default (good balance)
#   80   = High priority (recommended for dedicated audio machines)
#   99   = Maximum (use with caution, can starve system threads)
RT_PRIORITY=50

# ============================================================================
# TROUBLESHOOTING
# ============================================================================
#
# Problem: Renderer not discovered by control points in 3-tier setup
# Solution: Set INTERFACE to the interface with control points
#           Example: INTERFACE="eth0"
#
# Problem: How to find which interface to use?
# Solution: Run: ip addr show
#           Look for the IP on the same subnet as your control points
#
# Problem: Renderer discovered but no audio
# Solution: Check TARGET points to correct Diretta DAC IP on audio network
#
# For more help: https://github.com/cometdom/DirettaRendererUPnP/issues
